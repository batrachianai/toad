## Panel Commands

Claude Code can control Toad’s side panels via the `/panel` slash command:

- `/panel <panel_id>` — open a panel (e.g. `/panel github`)
- `/panel <panel_id> close` — close a panel
- `/panel list` — list available panels

When the user asks to see project state, issues, or PRs, use `/panel github` to open the GitHub panel. Use `/panel github close` when they ask to hide or close it.

